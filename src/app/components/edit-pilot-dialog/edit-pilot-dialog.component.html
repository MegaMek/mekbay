<div class="wide-dialog">
    <h2 class="wide-dialog-title">Warrior Data</h2>
    <div class="wide-dialog-body">
        <div class="form-row commander-layout">
            <div class="commander-name-row">
                @if (data.group) {
                <button
                    type="button"
                    class="group-commander-toggle bt-button square"
                    [class.active]="selectedGroupCommander()"
                    [attr.aria-label]="selectedGroupCommander() ? 'Unset group commander' : 'Set as group commander'"
                    [attr.aria-pressed]="selectedGroupCommander()"
                    [attr.title]="selectedGroupCommander() ? 'Unset group commander' : 'Set as group commander'"
                    (click)="setGroupCommanderSelected(!selectedGroupCommander())">
                    <svg class="group-commander-icon" width="21" height="26" viewBox="0 0 21 25.9" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
                        <g transform="translate(-.02)">
                            <g transform="matrix(.265 0 0 .265 -21.1 0)" fill="currentColor">
                                <path d="m79.7 70 39.3-70 40 70.1h-27l-13-22.1-13 22.1z" />
                                <path d="m81.4 97.9 11.3-21.6h52.3l12 21.6z" />
                            </g>
                        </g>
                    </svg>
                </button>
                }
                <div class="form-fields name-field">
                    <label class="field-label">Name</label>
                    <input #nameInput type="text" class="field-input" autocomplete="off" [value]="data.name || ''"
                        maxlength="32" (keydown.enter)="submit()" />
                    @if (data.group && selectedGroupCommander()) {
                    <div class="field-note group-commander-inline-note">This unit is the group commander.</div>
                    }
                </div>
            </div>
        </div>
        <div class="form-row no-stack">
            <div class="form-fields">
                <label class="field-label">{{ data.labelGunnery || 'Gunnery Skill' }}</label>
                <div #gunneryTrigger>
                    <button class="bt-select skill-selector" (click)="toggleGunneryDropdown()">
                        <span class="skill-selector-value">{{ currentGunnery() }}</span>
                    </button>
                </div>
            </div>
            <div class="form-fields" [class.disabled]="!!data.disablePiloting">
                <label class="field-label">{{ data.labelPiloting || 'Piloting Skill' }}</label>
                <div #pilotingTrigger>
                    <button class="bt-select skill-selector" [disabled]="!!data.disablePiloting"
                        (click)="togglePilotingDropdown()">
                        <span class="skill-selector-value">{{ currentPiloting() }}</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <div class="wide-dialog-actions">
        <button (click)="submit()" class="bt-button">CONFIRM</button>
        @if (!data.disablePiloting && hasBvPreview) {
        <button #matrixTrigger class="bt-button square" title="Skill Matrix" (click)="toggleMatrixView()">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <rect x="1" y="1" width="4" height="4" rx="0.5" />
                <rect x="6" y="1" width="4" height="4" rx="0.5" />
                <rect x="11" y="1" width="4" height="4" rx="0.5" />
                <rect x="1" y="6" width="4" height="4" rx="0.5" />
                <rect x="6" y="6" width="4" height="4" rx="0.5" />
                <rect x="11" y="6" width="4" height="4" rx="0.5" />
                <rect x="1" y="11" width="4" height="4" rx="0.5" />
                <rect x="6" y="11" width="4" height="4" rx="0.5" />
                <rect x="11" y="11" width="4" height="4" rx="0.5" />
            </svg>
        </button>
        }
        <button (click)="close()" class="bt-button">DISMISS</button>
    </div>
</div>
