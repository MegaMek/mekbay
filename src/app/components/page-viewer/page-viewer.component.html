<viewer-stage #container
              [swiping]="stageSwiping()"
              [multipleVisible]="effectiveVisiblePageCount() > 1"
              [atMinZoom]="isFullyVisible()">
    <!-- Swipe wrapper handles X translation during swipe (separate from zoom) -->
    <div #swipeWrapper class="swipe-wrapper">
        <!-- Content wrapper receives zoom/pan transforms, contains all pages -->
        <div #content class="page-content">
            @for (page of rewriteActivePages(); track page.key) {
                <viewer-page [descriptor]="page"></viewer-page>
            }
            @for (shadow of rewriteShadowPages(); track shadow.key) {
                <viewer-shadow-page [descriptor]="shadow"></viewer-shadow-page>
            }
        </div>
    </div>

    <!-- Fixed interaction overlay container for single-page mode -->
    <!-- When only 1 page is visible, the overlay is placed here to stay fixed during zoom/pan -->
    <div #fixedOverlayContainer class="fixed-overlay-container"></div>
</viewer-stage>

<!-- Canvas controls (FAB) - global for all canvases -->
@if (!readOnly()) {
    <page-viewer-canvas-controls [unit]="unit()" (clearRequested)="onCanvasClearRequested()" (printRequested)="onPrintRequested()"></page-viewer-canvas-controls>
}

<!-- Heat diff markers for each interaction service -->
@if (!readOnly()) {
    @for (marker of heatDiffMarkerArray(); track marker.unitId) {
        <heat-diff-marker 
            [data]="marker.data"
            [visible]="marker.visible">
        </heat-diff-marker>
    }
}

<!-- Error state -->
@if (loadError()) {
    <div class="error-container">
        <div class="error-message">{{ loadError() }}</div>
        <button (click)="retryLoad()" class="bt-button reload-button">
            <span class="icon">&#x21bb;</span>
            <span>Reload</span>
        </button>
    </div>
}
