<svg class="vessel-card-svg" [attr.viewBox]="'0 0 ' + cardViewBoxWidth + ' ' + cardViewBoxHeight" preserveAspectRatio="xMidYMid meet">
    <text x="30" [attr.y]="headerBaselineY()" class="vessel-title" [attr.font-size]="headerFontSize()">{{ headerTitle() }}</text>

    @let columns = arcTableColumns();
    @for (table of arcTableLayouts(); track table.arc.label) {
        <g [attr.transform]="'translate(' + table.x + ' ' + table.y + ')'">
            <rect x="0.75" y="0.75" [attr.width]="arcTableWidth - 1.5" [attr.height]="arcTableHeight - 1.5" rx="7" ry="7" class="arc-table-frame"></rect>

            <g [attr.transform]="'translate(25,' + (arcTableHeight / 2) + ') rotate(-90)'">
                <text x="0" y="0" text-anchor="middle" dominant-baseline="middle" class="arc-label-svg" [attr.fill]="arcLabelFill()">{{ table.arc.label }}</text>
            </g>

            <line x1="48" y1="18" x2="44" [attr.y2]="arcTableHeight - 18" class="arc-table-divider-svg"></line>
            <line x1="46" [attr.y1]="arcHeaderDividerY()" [attr.x2]="arcTableWidth - 18" [attr.y2]="arcHeaderDividerY()" class="arc-table-divider-svg"></line>
            <line x1="160" [attr.y1]="arcHeaderDividerY()" [attr.x2]="arcTableWidth - 18" [attr.y2]="arcHeaderDividerY()" class="arc-table-heavy-divider-svg"></line>

            @for (column of columns; track column.key) {
                <text [attr.x]="column.centerX" y="29" text-anchor="middle" class="arc-table-header-svg">{{ column.label }}</text>
            }

            @for (row of arcRangeRows; track row.key) {
                <line x1="46" [attr.y1]="arcLightDividerY(row.y)" [attr.x2]="arcTableWidth - 18" [attr.y2]="arcLightDividerY(row.y)" class="arc-table-light-divider-svg"></line>
                <text x="56" [attr.y]="row.y" class="arc-table-range-svg">{{ row.label() }}</text>
                @for (column of columns; track column.key) {
                    <text [attr.x]="column.centerX" [attr.y]="row.y" text-anchor="middle" class="arc-table-value-svg">{{ arcColumnValue(table.arc, column.key, row.key) }}</text>
                }
            }

            <line x1="46" [attr.y1]="arcSpeDividerY()" [attr.x2]="arcTableWidth - 18" [attr.y2]="arcSpeDividerY()" class="arc-table-light-divider-svg"></line>
            <text x="56" y="225" class="arc-table-range-svg">SPE</text>
            <text x="136" y="225" class="arc-table-spe-svg">{{ table.arc.spe ?? '' }}</text>

            <line x1="46" [attr.y1]="arcHeavyCritDividerY()" [attr.x2]="arcTableWidth - 18" [attr.y2]="arcHeavyCritDividerY()" class="arc-table-heavy-divider-svg"></line>
            <text x="56" [attr.y]="arcCritRowY()" class="arc-table-range-svg">CRIT</text>

            @for (column of columns; track column.key; let columnIndex = $index) {
                @let critKey = table.arc.shortLabel + '-' + column.key;
                @if (!$first) {
                    <line [attr.x1]="arcCritDividerX(columns, columnIndex - 1)" y1="247" [attr.x2]="arcCritDividerX(columns, columnIndex - 1)" y2="268" class="arc-table-divider-svg"></line>
                }
                @for (pipIndex of range(4); track pipIndex) {
                    <circle
                        [attr.cx]="arcCritPipX(columns, columnIndex, pipIndex)"
                        [attr.cy]="arcCritPipY()"
                        r="7.4"
                        class="arc-crit-pip-circle"
                        [class.damaged]="isCritPipDamaged(critKey, pipIndex)"
                        [class.pending-damage]="isCritPipPendingDamage(critKey, pipIndex)"
                        [class.pending-heal]="isCritPipPendingHeal(critKey, pipIndex)">
                    </circle>
                }
            }
        </g>
    }

    <text x="30" y="694" class="weapon-note-title">WEAPON CRITICALS:</text>
    <text x="230" y="694" class="weapon-note-text">{{ weaponCriticalsText() }}</text>
</svg>

<!-- Destroyed Overlay -->
@if (isDestroyed()) {
<div class="destroyed-overlay">
    <div class="destroyed-overlay-svg-shell" aria-hidden="true">
        <svg class="destroyed-overlay-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
            <rect x="0" y="0" width="100" height="100" class="destroyed-overlay-tint"></rect>
        </svg>
    </div>
</div>
}
