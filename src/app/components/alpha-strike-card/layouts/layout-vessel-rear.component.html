<svg class="layout-content" x="0" y="0" width="1120" height="800" viewBox="0 0 1120 800" overflow="visible">
<text class="chassis-text" [attr.x]="cardGeometry.bodyInset" y="62" fill="#000" font-family="Roboto Condensed, sans-serif"
    font-size="40" font-weight="700" letter-spacing="0.05em">
    {{ (forceUnit()?.alias() || chassis() + ' ' + model()).toUpperCase() }}
</text>
@for (arc of vesselArcData(); track arc.label; let arcIndex = $index) {
    @let arcWidth = vesselRearGeometry.frameWidth;
    @let arcHeight = vesselRearGeometry.frameHeight;
    @let arcX = arcIndex % 2 === 0 ? cardGeometry.bodyInset : cardGeometry.bodyInset + arcWidth + cardGeometry.frameGap;
    @let arcY = arcIndex < 2 ? vesselRearGeometry.top : vesselRearGeometry.top + arcHeight + cardGeometry.frameGap;
    @let columns = vesselArcColumns();
    @let tableX = arcX + vesselRearGeometry.tableXOffset;
    @let tableWidth = arcWidth - vesselRearGeometry.tableXOffset - vesselRearGeometry.tableRightInset;
    @let valueWidth = (tableWidth - vesselRearGeometry.rowLabelWidth) / columns.length;
    <g class="arc-damage-table">
        <rect class="frame-background" [attr.x]="arcX" [attr.y]="arcY" [attr.width]="arcWidth" [attr.height]="arcHeight"
            rx="16" fill="#fff" fill-opacity="0.85" stroke="#666" stroke-width="3" />
        <text [attr.x]="arcX + vesselRearGeometry.captionXOffset" [attr.y]="arcY + arcHeight / 2" fill="#7b0000" font-family="Roboto Condensed, sans-serif" font-size="26" font-weight="900"
            text-anchor="middle" [attr.transform]="'rotate(-90 ' + (arcX + vesselRearGeometry.captionXOffset) + ' ' + (arcY + arcHeight / 2) + ')'">{{ arc.label }}</text>
        @for (column of columns; track column; let columnIndex = $index) {
            <text [attr.x]="tableX + vesselRearGeometry.rowLabelWidth + columnIndex * valueWidth + valueWidth / 2" [attr.y]="arcY + 30"
                fill="#000" font-size="23" font-weight="900" text-anchor="middle">{{ column }}</text>
        }
        <line [attr.x1]="tableX" [attr.y1]="arcY + 38" [attr.x2]="arcX + arcWidth - 14" [attr.y2]="arcY + 38" stroke="#000" stroke-width="2" />
        @for (row of arc.rows; track row.label; let rowIndex = $index) {
            @let rowY = arcY + 70 + rowIndex * 38;
            <text [attr.x]="tableX" [attr.y]="rowY" fill="#000" font-size="23" font-weight="700">{{ row.label }}</text>
            @for (value of row.values; track $index; let valueIndex = $index) {
                <text [attr.x]="tableX + vesselRearGeometry.rowLabelWidth + valueIndex * valueWidth + valueWidth / 2" [attr.y]="rowY"
                    fill="#000" font-size="23" font-weight="600" text-anchor="middle">{{ value }}</text>
            }
            <line [attr.x1]="tableX" [attr.y1]="rowY + 10" [attr.x2]="arcX + arcWidth - 14" [attr.y2]="rowY + 10" stroke="#bbb" stroke-width="1" />
        }
        <text [attr.x]="tableX" [attr.y]="arcY + 229" fill="#000" font-size="23" font-weight="700">SPE</text>
        @for (token of arc.specials.tokens; track $index) {
            <text class="special-ability as-value" [attr.data-original]="token.state.original"
                [attr.x]="tableX + vesselRearSpecialsGeometry.contentXOffset + token.x"
                [attr.y]="arcY + vesselRearSpecialsGeometry.topOffset + arc.specials.firstBaseline + token.line * arc.specials.lineHeight"
                fill="#7b0000" font-family="Roboto, sans-serif" [attr.font-size]="arc.specials.fontSize" font-weight="900"
                (click)="onSpecialClick(token.state, $event)">{{ token.text }}</text>
        }
        <line [attr.x1]="tableX + vesselRearGeometry.rowLabelWidth" [attr.y1]="arcY + vesselRearGeometry.critDividerOffset"
            [attr.x2]="arcX + arcWidth - vesselRearGeometry.tableRightInset" [attr.y2]="arcY + vesselRearGeometry.critDividerOffset"
            stroke="#000" stroke-width="2" />
        <text [attr.x]="tableX" [attr.y]="arcY + 264" fill="#000" font-size="23" font-weight="700">CRIT</text>
        @for (column of columns; track column; let columnIndex = $index) {
            @let critKey = arc.shortLabel + '-' + column;
            @let pipClusterX = tableX + vesselRearGeometry.rowLabelWidth + columnIndex * valueWidth
                + (valueWidth - 3 * vesselRearGeometry.critPipSpacing) / 2;
            <g class="critical-row arc-critical-row" [attr.data-crit]="critKey">
                @for (pipIndex of range(4); track pipIndex) {
                    <circle class="pip" [class.damaged]="isCritPipDamaged(critKey, pipIndex)"
                        [class.pending-damage]="isCritPipPendingDamage(critKey, pipIndex)"
                        [class.pending-heal]="isCritPipPendingHeal(critKey, pipIndex)"
                        [attr.cx]="pipClusterX + pipIndex * vesselRearGeometry.critPipSpacing"
                        [attr.cy]="arcY + vesselRearGeometry.critPipCenterOffset" [attr.r]="vesselRearGeometry.critPipRadius"
                        fill="#fff" stroke="#000" stroke-width="3" />
                }
            </g>
            @if (columnIndex < columns.length - 1) {
                <line class="crit-pip-separator"
                    [attr.x1]="tableX + vesselRearGeometry.rowLabelWidth + (columnIndex + 1) * valueWidth"
                    [attr.x2]="tableX + vesselRearGeometry.rowLabelWidth + (columnIndex + 1) * valueWidth"
                    [attr.y1]="arcY + vesselRearGeometry.critDividerOffset" [attr.y2]="arcY + 270"
                    stroke="#000" stroke-width="2" />
            }
        }
    </g>
}
<text [attr.x]="cardGeometry.bodyInset" [attr.y]="vesselRearGeometry.noteBaseline" fill="#000" font-size="19" font-weight="900">WEAPON CRITICALS</text>
<text x="220" [attr.y]="vesselRearGeometry.noteBaseline" fill="#000" font-family="Roboto, sans-serif" font-size="17">
    Damage Value Reduced by 25% per hit. — Randomly determine an appropriate STD/@if (vesselHasCap()) {CAP/}SCAP/MSL column.
</text>
</svg>
