<div #picker class="linear-picker linear-picker-vertical" [class.light-theme]="lightTheme()" [class.touch]="layoutService.isTouchInput()"
    [class.label-right]="labelOnRight()">
    @for (choice of values(); let i = $index; track choice.value) {
    @switch(choice.displayType) {
    @case ('dropdown') {
    <div class="value-cell dropdown-cell" [class.selected]="isSelected(choice)"
        [class.highlight]="isHovered(choice) && !choice.disabled" [class.disabled]="choice.disabled"
        [class.active]="choice.active" [class.muted-active]="choice.active && choice.selectionTone === 'muted'"
        [style.--picker-choice-normal-color]="choice.colors?.normal"
        [style.--picker-choice-normal-text-color]="choice.colors?.normalText"
        [style.--picker-choice-selected-color]="choice.colors?.selected"
        [style.--picker-choice-selected-text-color]="choice.colors?.selectedText"
        [style.--picker-choice-muted-selected-color]="choice.colors?.mutedSelected"
        [style.--picker-choice-muted-selected-text-color]="choice.colors?.mutedSelectedText"
        [style.--picker-choice-disabled-color]="choice.colors?.disabled"
        [style.--picker-choice-disabled-text-color]="choice.colors?.disabledText">
        <label [for]="'dropdown-vertical-' + i">{{ choice.label }}</label>
        <select [id]="'dropdown-vertical-' + i" [title]="choice.label" (change)="handleDropdownChange($event, choice)">
            @for (option of choice.choices; track option.value) {
            <option [value]="option.value" [selected]="option.value === choice.value">{{ option.label }}</option>
            }
        </select>
    </div>
    }
    @case ('label') {
    <div class="value-cell label-cell">{{ choice.label }}</div>
    }
    @case ('state-button') {
    <div class="value-cell state-button-cell" [class.selected]="isSelected(choice)"
        [class.highlight]="isHovered(choice) && !choice.disabled" [class.disabled]="choice.disabled"
        [class.active]="choice.active" [class.muted-active]="choice.active && choice.selectionTone === 'muted'"
        [style.--picker-choice-normal-color]="choice.colors?.normal"
        [style.--picker-choice-normal-text-color]="choice.colors?.normalText"
        [style.--picker-choice-selected-color]="choice.colors?.selected"
        [style.--picker-choice-selected-text-color]="choice.colors?.selectedText"
        [style.--picker-choice-muted-selected-color]="choice.colors?.mutedSelected"
        [style.--picker-choice-muted-selected-text-color]="choice.colors?.mutedSelectedText"
        [style.--picker-choice-disabled-color]="choice.colors?.disabled"
        [style.--picker-choice-disabled-text-color]="choice.colors?.disabledText"
        [attr.data-title]="isSelected(choice) ? title() : null"
        (pointerenter)="setHoveredChoice(choice)" (pointerleave)="resetHovered()"
        (pointerdown)="setHoveredChoice(choice)" (click)="handleChoiceClick($event, choice)">
        {{ choice.label }}: {{ choice.shortLabel }}
    </div>
    }
    @default {
    <div class="value-cell button-cell" [class.selected]="isSelected(choice)"
        [class.highlight]="isHovered(choice) && !choice.disabled" [class.disabled]="choice.disabled"
        [class.active]="choice.active" [class.muted-active]="choice.active && choice.selectionTone === 'muted'"
        [style.--picker-choice-normal-color]="choice.colors?.normal"
        [style.--picker-choice-normal-text-color]="choice.colors?.normalText"
        [style.--picker-choice-selected-color]="choice.colors?.selected"
        [style.--picker-choice-selected-text-color]="choice.colors?.selectedText"
        [style.--picker-choice-muted-selected-color]="choice.colors?.mutedSelected"
        [style.--picker-choice-muted-selected-text-color]="choice.colors?.mutedSelectedText"
        [style.--picker-choice-disabled-color]="choice.colors?.disabled"
        [style.--picker-choice-disabled-text-color]="choice.colors?.disabledText"
        [attr.data-title]="isSelected(choice) ? title() : null"
        (pointerenter)="setHoveredChoice(choice)" (pointerleave)="resetHovered()"
        (pointerdown)="setHoveredChoice(choice)" (click)="handleChoiceClick($event, choice)">
        {{ choice.shortLabel ?? choice.label }}
    </div>
    }
    }
    }
</div>
