<!DOCTYPE html>
<html>
<head>
  <title>Mekbay Test Bay</title>
  <link href="favicon.ico" rel="icon" type="image/x-icon">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #111;
      color: #e8e8e8;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      user-select: text !important;
    }

    iframe {
      height: 100%;
      width: 100%;
      border: 0;
      background: #111;
    }

    #banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: #141414;
      border-bottom: 2px solid #f2a632;
    }

    .offline #banner { border-bottom-color: #555; }
    .executing #banner { border-bottom-color: #ff6b6b; }

    h1 {
      font-size: 1rem;
      font-weight: 600;
      color: #e8e8e8;
      margin: 0;
      padding: 0;
    }

    ul {
      margin: 0;
      padding: 6px 20px;
      list-style: none;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
    }

    li {
      padding: 3px 0;
      color: #aaa;
      font-size: 0.85rem;
    }

    .btn-debug {
      color: #111 !important;
      background: #f2a632;
      padding: 6px 18px;
      border-radius: 4px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      font-family: inherit;
      border: none;
      cursor: pointer;
      float: right;
    }

    .btn-debug:hover {
      background: #ffc35a;
    }

    .jasmine_html-reporter {
      background-color: transparent !important;
    }

    .offline .btn-debug { display: none; }
  </style>
</head>
<body>
  <div id="banner" class="offline">
    <a href="#" onclick="window.open('debug.html')" class="btn-debug">DEBUG</a>
    <h1 id="title">Karma - starting</h1>
  </div>

  <ul id="browsers"></ul>

  <iframe id="context" src="about:blank" width="100%" height="100%"></iframe>

  <script src="socket.io/socket.io.min.js"></script>
  <script src="karma.js"></script>
</body>
</html>
